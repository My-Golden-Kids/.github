name: Sync Organization README

on:
  push:
    paths:
      - 'profile/README.md' # profile 폴더의 리드미가 수정될 때만 실행
  workflow_dispatch: # 직접 버튼을 눌러 actions 실행

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy README to root
        run: cp profile/README.md README.md
          
      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: sync root README with profile/README.md" || exit 0
          git push
